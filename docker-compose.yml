services:
  whoisai:
    image: 10.150.115.69/dice-zero/whoisai:latest
    container_name: whoisai
    restart: unless-stopped
    ports:
      - "33333:3000"
    environment:
      # 容器内 localhost 不是宿主机：LLM 代理跑在宿主机时用 host.docker.internal
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://10.150.115.69:50951/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-dummy}
      - MODEL_PRIMARY=${MODEL_PRIMARY:-claude-opus-4.6}
      - MODEL_FALLBACK=${MODEL_FALLBACK:-gpt-4.1}
      - HOST_KEY=${HOST_KEY:-whoisai}
    volumes:
      # 游戏状态快照持久化，容器重启不丢记录
      - ./whoisai/data:/app/data
      # 领域素材包：改动后重启容器即可生效，无需重新 build 镜像
      - ./whoisai/server/domain-notes:/app/domain-notes
